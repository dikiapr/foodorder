<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FoodStore - Login &amp; Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-tint": "#9d4300",
                        "surface-container-highest": "#f6ded3",

                        "secondary-container": "#2170e4",
                        "background": "#fff8f6",
                        "tertiary-container": "#00a2f4",
                        "secondary-fixed": "#d8e2ff",
                        "on-surface": "#251913",
                        "inverse-on-surface": "#ffede6",
                        "on-secondary-fixed-variant": "#004395",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#ffdbca",
                        "on-tertiary-fixed": "#001d32",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#341100",
                        "primary": "#9d4300",
                        "on-secondary-container": "#fefcff",

                        "on-tertiary-fixed-variant": "#004b74",
                        "surface-container-low": "#fff1eb",

                        "surface-variant": "#f6ded3",
                        "outline-variant": "#e0c0b1",
                        "on-tertiary-container": "#003554",
                        "on-secondary-fixed": "#001a42",
                        "tertiary-fixed-dim": "#93ccff",
                        "on-secondary": "#ffffff",
                        "surface-container": "#ffeae0",
                        "secondary": "#0058be",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#cde5ff",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-primary-fixed-variant": "#783200",
                        "on-background": "#251913"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "lg": "48px",
                        "gutter": "24px",
                        "base": "8px",
                        "md": "24px",
                        "sm": "12px",
                        "xl": "80px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "display-xl": ["Inter"],
                        "body-lg": ["Inter"],

                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

            }
        }

</head>
<body class="bg-[#F9FAFB] min-h-screen flex items-center justify-center p-4 antialiased">
<!-- Main Container: Split Card Design -->
<div class="w-full max-w-4xl bg-surface-container-lowest rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row h-full md:h-[600px]">
<!-- Left Side: Image/Brand Area -->
<div class="w-full md:w-1/2 relative hidden md:block">
<img alt="Appetizing food background" class="absolute inset-0 w-full h-full object-cover" data-alt="A beautifully styled flat lay of vibrant, fresh ingredients including bright red tomatoes, green basil, and golden olive oil on a rustic wooden table. The scene is bathed in warm, natural sunlight creating a fresh, appetizing, and inviting atmosphere. The overall aesthetic is modern, clean, and professional, perfectly aligning with a premium food delivery service's brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4KjTtQJOXgt7Y_MZLv1XVWM-M-OYkvLxqUs0UzCQwHZUvKLGsg8BU9JLiZovu-CMB5pbOdkrzRlhF_kKJcv0gBQt3z3K8HLp0wsF2_0sTuM5xAtrvKcMTqh4B_qIlrDXurofoHxTNpMwsvUielW7jHZA2dhJgroYspgkl7fXbHzeC85U4buHOOx5jRuhmaahg_k_NppxbdMY3KkO1ZGRCo5hKid-23uIWqZsCrA6w89ijC7iveNoLjcL6oQme_37VtlvyGRav3H4"/>
<div class="absolute inset-0 bg-gradient-to-t from-inverse-surface/80 to-transparent flex flex-col justify-end p-lg">
<div class="mb-sm">
<span class="material-symbols-outlined text-primary-container text-[48px]" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-surface-container-lowest mb-xs">FoodStore</h1>
<p class="font-body-lg text-body-lg text-surface-variant">The Professional Chef Next Door. Freshness delivered to your table.</p>
</div>
</div>
<!-- Right Side: Forms Area -->
<div class="w-full md:w-1/2 flex flex-col h-full overflow-y-auto">
<!-- Mobile Brand Header (Visible only on small screens) -->
<div class="md:hidden flex flex-col items-center pt-md pb-sm border-b border-surface-variant">
<span class="material-symbols-outlined text-primary-container text-[40px]" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
<h1 class="font-headline-md text-headline-md text-on-surface mt-xs">FoodStore</h1>
</div>
<!-- Tab Navigation (CSS only toggle simulation) -->
<div class="flex border-b border-surface-variant shrink-0 sticky top-0 bg-surface-container-lowest z-10">
<button class="flex-1 py-md font-label-md text-label-md text-primary-container border-b-2 border-primary-container text-center focus:outline-none transition-colors">
                    Login
                </button>
<button class="flex-1 py-md font-label-md text-label-md text-on-surface-variant hover:text-on-surface border-b-2 border-transparent hover:border-surface-variant text-center focus:outline-none transition-colors">
                    Register
                </button>
</div>
<!-- Content Area (Currently showing Login) -->
<div class="p-lg flex-1 flex flex-col justify-center">
<div class="mb-lg">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<form class="space-y-md">
<!-- Username/Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="login-identifier">Username or Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<input class="block w-full pl-lg pr-sm py-sm border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface bg-surface-container-lowest focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-shadow outline-none" id="login-identifier" name="login-identifier" placeholder="Enter your username or email" type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-md text-label-md text-on-surface" for="login-password">Password</label>
<a class="font-caption text-caption text-primary-container hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-lg pr-[40px] py-sm border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface bg-surface-container-lowest focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-shadow outline-none" id="login-password" name="login-password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-sm flex items-center text-outline hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary-container border-outline-variant rounded focus:ring-primary-container cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember-me">
                            Remember me
                        </label>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full flex justify-center py-sm px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary-container hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-colors" type="submit">
                            Sign In
                        </button>
</div>
</form>
<!-- Social Login Separator -->
<div class="mt-lg">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest text-on-surface-variant font-caption text-caption uppercase tracking-wider">Or continue with</span>
</div>
</div>
<div class="mt-md grid grid-cols-2 gap-md">
<button class="w-full flex justify-center items-center py-sm px-4 border border-outline-variant rounded-DEFAULT shadow-sm bg-surface-container-lowest text-on-surface font-label-md text-label-md hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined mr-2 text-[20px]">google</span>
                            Google
                        </button>
<button class="w-full flex justify-center items-center py-sm px-4 border border-outline-variant rounded-DEFAULT shadow-sm bg-surface-container-lowest text-on-surface font-label-md text-label-md hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined mr-2 text-[20px]">ios</span>
                            Apple
                        </button>
</div>
</div>
</div>
</div>
</div>
</body></html>
